name: JEE God Mode — Daily Push Notifications

on:
  # ── All times in UTC ─────────────────────────────────────────────────────────
  #  7:00 AM IST = 01:30 UTC → morning
  # 10:00 PM IST = 16:30 UTC → night + milestone + weekly graph (Sundays)
  # 11:00 PM IST = 17:30 UTC → battle reminder + streak panic
  # 12:00 AM IST = 18:30 UTC → streak reset check
  schedule:
    - cron: "30 1  * * *" # → morning
    - cron: "30 16 * * *" # → night
    - cron: "30 17 * * *" # → reminder
    - cron: "30 18 * * *" # → streak_reset

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      type:
        description: "Notification type"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - night
          - reminder
          - streak_reset
          - milestone
          - weekly

jobs:
  morning:
    name: Morning notification (7 AM IST)
    runs-on: ubuntu-latest
    # Only runs on the 01:30 UTC cron OR manual morning trigger
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 1 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'morning')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: scripts
      - run: node send-notifications.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NOTIFICATION_TYPE: morning

  night:
    name: Night notification (10 PM IST)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 16 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'night')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: scripts
      - run: node send-notifications.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NOTIFICATION_TYPE: night

  reminder:
    name: Battle reminder + streak panic (11 PM IST)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 17 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'reminder')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: scripts
      - run: node send-notifications.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NOTIFICATION_TYPE: reminder

  streak_reset:
    name: Streak reset check (12 AM IST)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 18 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'streak_reset')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: scripts
      - run: node send-notifications.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NOTIFICATION_TYPE: streak_reset

  milestone:
    name: Milestone check (manual only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'milestone'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: scripts
      - run: node send-notifications.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NOTIFICATION_TYPE: milestone

  weekly:
    name: Weekly graph (manual only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'weekly'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: scripts
      - run: node send-notifications.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          NOTIFICATION_TYPE: weekly
